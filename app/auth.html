<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self'; style-src 'self'; img-src 'self' data:; media-src 'self' blob: file: data:; connect-src 'self';" />
    <title>Memora Login</title>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <main class="auth-shell">
      <section class="auth-card auth-card--split">
        <aside class="auth-visual">
          <div class="auth-visual__chrome">
            <div class="brand-lockup auth-visual__brand">
              <img class="brand-logo" src="./assets/memora-logo.png" alt="Memora logo" />
              <div class="brand">Memora</div>
            </div>
            <button class="auth-visual__pill" type="button" disabled>Desktop Native</button>
          </div>
          <div class="auth-visual__image" role="img" aria-label="Decorative visual placeholder"></div>
          <div class="auth-visual__caption">Capturing Moments, Creating Memories</div>
          <div class="auth-visual__dots" aria-hidden="true">
            <span></span>
            <span></span>
            <span class="is-active"></span>
          </div>
        </aside>

        <section class="auth-pane">
          <h1 id="authTitle" class="auth-title">Create an account</h1>
          <p class="auth-copy">Your sessions, categories, and settings stay private to your account.</p>

          <p class="auth-switchline">
            <span id="authSwitchPrompt">Already have an account?</span>
            <button id="switchInlineBtn" class="auth-link-btn" type="button">Log in</button>
          </p>

          <form id="registerForm" class="auth-form">
            <div class="auth-name-row">
              <div class="auth-field">
                <input id="registerFirstName" type="text" autocomplete="given-name" placeholder="First name" required />
                <span class="auth-error" id="registerFirstNameError"></span>
              </div>
              <div class="auth-field">
                <input id="registerLastName" type="text" autocomplete="family-name" placeholder="Last name" required />
                <span class="auth-error" id="registerLastNameError"></span>
              </div>
            </div>
            <div class="auth-field">
              <input id="registerEmail" type="email" autocomplete="username" placeholder="Email" required />
              <span class="auth-error" id="registerEmailError"></span>
            </div>
            <div class="auth-field">
              <div class="auth-password-wrapper">
                <input id="registerPassword" type="password" autocomplete="new-password" minlength="8" placeholder="Create password" required />
                <button id="registerPasswordToggle" class="auth-password-toggle" type="button" aria-label="Show password">
                  <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"></path>
                    <circle cx="12" cy="12" r="3"></circle>
                  </svg>
                </button>
              </div>
              <div class="auth-strength-meter">
                <div class="auth-strength-bar" id="registerPasswordStrength"></div>
              </div>
              <span class="auth-strength-text" id="registerPasswordStrengthText"></span>
              <span class="auth-error" id="registerPasswordError"></span>
            </div>
            <label class="auth-checkbox">
              <input id="registerTerms" type="checkbox" required />
              <span>I agree to the Terms and Conditions</span>
            </label>
            <button class="button button--primary auth-submit" type="submit" id="registerSubmitBtn">Create Account</button>
          </form>

          <form id="loginForm" class="auth-form auth-form--hidden">
            <div class="auth-field">
              <input id="loginEmail" type="email" autocomplete="username" placeholder="Email" required />
              <span class="auth-error" id="loginEmailError"></span>
            </div>
            <div class="auth-field">
              <div class="auth-password-wrapper">
                <input id="loginPassword" type="password" autocomplete="current-password" placeholder="Enter your password" required />
                <button id="loginPasswordToggle" class="auth-password-toggle" type="button" aria-label="Show password">
                  <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"></path>
                    <circle cx="12" cy="12" r="3"></circle>
                  </svg>
                </button>
              </div>
              <span class="auth-error" id="loginPasswordError"></span>
            </div>
            <label class="auth-checkbox">
              <input id="loginRememberMe" type="checkbox" />
              <span>Keep me signed in for 30 days</span>
            </label>
            <button class="button button--primary auth-submit" type="submit" id="loginSubmitBtn">Login</button>
            <button id="resendVerificationBtn" class="auth-link-btn auth-link-btn--left auth-form__helper auth-form__helper--hidden" type="button">
              Resend verification email
            </button>
          </form>

          <form id="mfaForm" class="auth-form auth-form--hidden">
            <div class="auth-field">
              <input id="mfaCode" type="text" inputmode="numeric" autocomplete="one-time-code" placeholder="Enter 6-digit verification code" minlength="6" maxlength="8" required />
              <span class="auth-error" id="mfaCodeError"></span>
            </div>
            <button class="button button--primary auth-submit" type="submit" id="mfaSubmitBtn">Verify Code</button>
            <button id="mfaBackBtn" class="auth-link-btn auth-link-btn--left auth-form__helper" type="button">Back to login</button>
          </form>

          <p id="authStatus" class="status auth-status">Ready.</p>
        </section>
      </section>
    </main>

    <script type="module" src="./auth.js"></script>
  </body>
</html>
