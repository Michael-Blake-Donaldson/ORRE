<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self'; style-src 'self'; img-src 'self' data:; media-src 'self' blob: file: data:; connect-src 'self';" />
    <title>Memora Login</title>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <main class="auth-shell">
      <section class="auth-card auth-card--split">
        <aside class="auth-visual">
          <div class="auth-visual__chrome">
            <div class="brand-lockup auth-visual__brand">
              <img class="brand-logo" src="./assets/memora-logo.png" alt="Memora logo" />
              <div class="brand">Memora</div>
            </div>
            <button class="auth-visual__pill" type="button" disabled>Desktop Native</button>
          </div>
          <div class="auth-visual__image" role="img" aria-label="Decorative visual placeholder"></div>
          <div class="auth-visual__caption">Capturing Moments, Creating Memories</div>
          <div class="auth-visual__dots" aria-hidden="true">
            <span></span>
            <span></span>
            <span class="is-active"></span>
          </div>
        </aside>

        <section class="auth-pane">
          <h1 id="authTitle" class="auth-title">Create an account</h1>
          <p class="auth-copy">Your sessions, categories, and settings stay private to your account.</p>

          <p class="auth-switchline">
            <span id="authSwitchPrompt">Already have an account?</span>
            <button id="switchInlineBtn" class="auth-link-btn" type="button">Log in</button>
          </p>

          <form id="registerForm" class="auth-form">
            <div class="auth-name-row">
              <input id="registerFirstName" type="text" autocomplete="given-name" placeholder="First name" required />
              <input id="registerLastName" type="text" autocomplete="family-name" placeholder="Last name" required />
            </div>
            <input id="registerEmail" type="email" autocomplete="username" placeholder="Email" required />
            <input id="registerPassword" type="password" autocomplete="new-password" minlength="8" placeholder="Create password" required />
            <label class="auth-checkbox">
              <input id="registerTerms" type="checkbox" required />
              <span>I agree to the Terms and Conditions</span>
            </label>
            <button class="button button--primary auth-submit" type="submit">Create Account</button>
          </form>

          <form id="loginForm" class="auth-form auth-form--hidden">
            <input id="loginEmail" type="email" autocomplete="username" placeholder="Email" required />
            <input id="loginPassword" type="password" autocomplete="current-password" placeholder="Enter your password" required />
            <button class="button button--primary auth-submit" type="submit">Login</button>
          </form>

          <div class="auth-divider" aria-hidden="true">
            <span></span>
            <p>or continue with</p>
            <span></span>
          </div>

          <div class="auth-social-row">
            <button class="button auth-social" type="button" disabled>Google</button>
            <button class="button auth-social" type="button" disabled>Apple</button>
          </div>

          <p id="authStatus" class="status auth-status">Ready.</p>
        </section>
      </section>
    </main>

    <script type="module" src="./auth.js"></script>
  </body>
</html>
