<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self'; style-src 'self'; img-src 'self' data:; media-src 'self' blob: file: data:; connect-src 'self';" />
    <title>Memora Library</title>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <div class="app-shell">
      <aside class="nav-rail">
        <div class="brand-lockup">
          <img class="brand-logo" src="./assets/memora-logo.png" alt="Memora logo" />
          <div class="brand">Memora</div>
        </div>
        <button class="nav-item" data-page="dashboard">Dashboard</button>
        <button class="nav-item nav-item--active">Library</button>
        <button class="nav-item" data-page="settings">Settings</button>
        <button class="nav-item" data-page="benchmarks">Benchmarks</button>
        <button class="nav-item" data-action="logout">Sign Out</button>
      </aside>

      <main class="workspace">
        <header class="topbar">
          <div>
            <h1>Video Library</h1>
            <p>Organize recordings by category and manage saved sessions.</p>
          </div>
        </header>

        <section class="grid">
          <article class="panel panel--wide">
            <div class="panel-header">
              <h2>Category Management</h2>
            </div>
            <div class="library-toolbar">
              <input id="libraryNewCategoryInput" type="text" placeholder="New category name" />
              <div class="button-row button-row--compact">
                <button id="libraryAddCategoryBtn" class="button">Add</button>
                <button id="libraryDeleteCategoryBtn" class="button">Delete</button>
              </div>
            </div>
            <div class="field-row">
              <label for="libraryCategoryFilter">Filter Sessions By Category</label>
              <select id="libraryCategoryFilter"></select>
            </div>
            <p id="libraryStatus" class="status">Use categories to keep recordings organized.</p>
          </article>

          <article class="panel panel--wide">
            <div class="panel-header">
              <h2>Saved Recordings</h2>
              <button id="libraryRefreshBtn" class="button button--mini">Refresh</button>
            </div>
            <div id="librarySessionGrid" class="library-grid"></div>
          </article>
        </section>
      </main>
    </div>

    <button id="backToTopBtn" class="back-to-top" type="button">Top</button>

    <script type="module" src="./library.js"></script>
  </body>
</html>
